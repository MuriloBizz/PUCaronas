<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <style>
        .form-control {
            width: 20vw;
        }
        .card {
            margin-top: 5vh;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        body {
            background-color: #f8f9fa;
        }
        .btn-link {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg" style="background-color: darkred;">
  <a class="navbar-brand text-white" style="color: white;" href="#">PUCaronas</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link text-white" href="../home.html">Home</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="../caronas/caronas.html">Caronas</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-white" href="login.html">Log in</a>
      </li>
      <li class="nav-item active">
        <a class="nav-link text-white" href="registro.html">Registrar-se <span class="sr-only">(current)</span></a>
      </li>
    </ul>
  </div>
</nav>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card">
        <h3 class="text-center mb-4">Registro</h3>
        <form>
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" class="form-control" name="nome" id="nome">
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" class="form-control" name="email" id="email">
            </div>
            <div class="form-group">
                <label for="senha_hash">Senha:</label>
                <input type="password" class="form-control" name="senha" id="senha_hash">
            </div>
            <div class="form-group">
                <label for="data_nasc">Data de Nascimento:</label>
                <input type="date" class="form-control" name="data_nasc" id="data_nasc">
            </div>
            <div class="form-group">
                <label for="cargos">Cargo:</label>
                <select class="form-control" name="cargos" id="cargos">
                  <option value="passageiro" name="passageiro" id="passageiro">Passageiro</option>
                  <option value="motorista" name="motorista" id="motorista">Motorista</option>
                </select>
            </div>
            
            <div id="docField" style="display: none;">
                <div class="form-group">
                    <label for="doc">Link documentação crachá e CNH:</label>
                    <input type="text" class="form-control" name="doc" id="doc">
                </div>
            </div>
            <button type="button" id="btn" class="btn btn-primary btn-block">Enviar</button>
            <h1 id="resultado" class="text-center mt-3" style="font-size:1.2rem;"></h1>
            <button type="button" class="btn btn-secondary btn-block mt-2">
                <a href="login.html" class="btn-link">Log in</a>
            </button>
        </form>
    </div>
</div>
<script>
        btn = document.getElementById("btn");
btn.addEventListener('click', enviar);

const selectCargo = document.getElementById('cargos');
const docField = document.getElementById('docField');

selectCargo.addEventListener('change', function () {
    if (selectCargo.value === 'motorista') {
        docField.style.display = 'block';
    } else {
        docField.style.display = 'none';
    }
});

async function enviar() {
    try {
        obj = {};
        const nome = document.getElementById('nome').value;
        const email = document.getElementById('email').value;
        const senha_hash = document.getElementById('senha_hash').value;
        const data_nasc = document.getElementById('data_nasc').value;
        var e = document.getElementById("cargos");
        var value = e.value;
        var cargo = e.options[e.selectedIndex].text;
        const doc = document.getElementById('doc').value;
        resultado = document.getElementById('resultado');

       
        const dominioPermitido = '@pucpr.edu.br'; 
        if (!email.endsWith(dominioPermitido)) {
            resultado.innerHTML = `E-mail inválido! Apenas e-mails do domínio <strong>${dominioPermitido}</strong> são permitidos.`;
            return;
        }

        
        if (senha_hash.length < 8) {
            resultado.innerHTML = "A senha deve ter no mínimo 8 caracteres!";
            return;
        }

        
        const hoje = new Date();
        hoje.setHours(0, 0, 0, 0); 
        const nascimento = new Date(data_nasc);
        if (nascimento > hoje) {
            resultado.innerHTML = "A data de nascimento não pode ser uma data futura!";
            return;
        }

        let requisicao = await fetch('../../api/usuario.php?action=cadastro', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ nome, email, senha_hash, data_nasc, cargo, doc })
        });

        const resposta = await requisicao.json();
        console.log("Resposta:", resposta);

        if (resposta.message) {
            sessionStorage.setItem("nome", nome);
            resultado.innerHTML = "Usuário adicionado com sucesso!!";
            window.location.href = 'login.html';
        }
    } catch (err) {
        console.log("erro é:" + err);
        resultado.innerHTML = "Dados inválidos!!";
    }
}
    </script>
</body>
</html>
