<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<style>

</style>
<body>
    
    <div>
<h1 id="bem-vindo">Seja bem-vindo: </h1>
<button type="button" id="logout">Log out</button>
    <table class="table">
        <thead>
          <tr>
    <th scope="col">ID</th>
    <th scope="col">NOME</th>
    <th scope="col">EMAIL</th>
    <th scope="col">SENHA</th>
    <th scope="col">DATA NASCIMENTO</th>
    <th scope="col">STATUS</th>
    <th scope="col">CARGO</th>
    <th scope="col">DOC</th>
    <th scope="col">ALTERAR</th>
    <th scope="col">DELETAR</th>
  </tr>
  </thead>



  <tbody id="tbody">



  </tbody>
    </table>
    </ul>
        
<br>

    </div>






 <script>
    document.addEventListener('DOMContentLoaded', function() {
        const bemvindo = document.getElementById('bem-vindo');
        const nome = sessionStorage.getItem('nome');
        if (nome == null ){
            window.location.href = 'login.html';
    }
    else{
           bemvindo.innerHTML = `Seja bem-vindo ${nome}`;
           receber();
    }

    });
    const lista = document.getElementById('lista');
        async function receber(){
            try {
            let requisicao = await fetch('../../api/usuario.php' , {
                method: 'GET',
                headers:{
                    'Content-Type': 'application/json'
                }
            })
        const resposta = await requisicao.json(); 
        console.log("Resposta:", resposta);
        tbody = document.getElementById('tbody');

        resposta.forEach(usuario => {
            tbody.innerHTML += `<tr>
            <td>${usuario.id}</td>
            <td>${usuario.nome}</td>
            <td>${usuario.email}</td>
            <td>${usuario.senha_hash}</td>
            <td>${usuario.data_nasc}</td>
            <td>${usuario.status}</td>
            <td>${usuario.cargo}</td>
            <td>${usuario.doc}</td>
            <td><a href="alterar_usuario.html?id=${usuario.id}">Alterar</a></td>
            <td><button onclick="deletar(${usuario.id})">Deletar</button></td>
                
                
            
                </tr>`
        })





    } 
            catch (err) {
                console.log(err);
            }




}
async function deletar(id){
    await fetch(`../../api/usuario.php?id=${id}`, { method: 'DELETE' });
    tbody = document.getElementById('tbody');
    tbody.innerHTML = "";
    receber(); 
}



logoutbtn = document.getElementById("logout");
logoutbtn.addEventListener('click',logout);
    function logout(){
     sessionStorage.removeItem('nome');
     window.location.href = 'login.html';   
    }
    </script>
</body>
</html>
