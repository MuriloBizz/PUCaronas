<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
  <div class="card p-4">
    <h3 class="text-center mb-4">Login</h3>
    <form>
        <div class="form-group">
        <label for="">Email:</label>
        <input class="form-control" placeholder="Email" type="email" id="email">
        </div>
        <div class="form-group">
        <label for="">Senha:</label>
        <input class="form-control" placeholder="Senha" type="password" id="senha">
        </div>
        <button id="enviar" type="button" class="btn btn-primary">Enviar</button>
          <button class="btn btn-secondary">
    <a href="registro.html" style="text-decoration: none; color: inherit;  cursor: pointer;  ">Registrar-se</a>
   </button>
        <h1 id="resultado" style="font-size: 1rem"></h1>
    </form>
  </div>
</div>





   <script>
    let nome = sessionStorage.getItem('nome');
    if (nome){
        window.location.href = 'gerenciar.html';
    }
    btn = document.getElementById('enviar');
    btn.addEventListener('click',login);
    
    
    
    
    async function login(){
        email = document.getElementById('email').value;
        senha_hash = document.getElementById('senha').value;
        requisicao = await fetch('../../api/usuario.php?action=login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({email,senha_hash})
});

    const resposta = await requisicao.json(); 
    const resultado = document.getElementById("resultado");
    dormir = (tempo) => new Promise(res => setTimeout(res,tempo));
    if(resposta.message == "Login ok") { 
    
            nome = await pegar_nome(email);
            sessionStorage.setItem("nome", nome); 
            resultado.innerHTML = "Usuário logado com sucesso!!";
            await dormir(1500);
            window.location.href = 'gerenciar.html';
            
        }
    else {
        resultado.innerHTML = "Email ou senha errados!!";
        await dormir(1500);
        resultado.innerHTML = "";

    }

    }

    async function pegar_nome(email){
            requisicao = await fetch(`../../api/usuario.php?email=${email}`, {
    method: 'GET',
    headers: { 'Content-Type': 'application/json' },
});


    const resposta = await requisicao.json(); 
    return resposta.nome;
    }    
    </script>
</body>
